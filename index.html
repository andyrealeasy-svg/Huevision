<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>HUEVISION 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            red: { 500: '#FF0000', 600: '#CC0000', 900: '#440000' }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Orbitron', 'sans-serif'],
            mono: ['ui-monospace', 'monospace']
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-black text-white font-sans selection:bg-red-500/30 selection:text-red-500 flex flex-col">
  <!-- Background -->
  <div class="fixed inset-0 pointer-events-none z-[0] opacity-20" 
       style="background-image: radial-gradient(circle at 50% 0%, #FF0000 0%, transparent 40%); filter: blur(100px);">
  </div>

  <nav class="fixed top-0 left-0 w-full z-50 glass-panel border-b-0 border-white/5 py-4">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between">
      <div 
        class="text-red-500 font-display font-black text-xl tracking-widest uppercase cursor-pointer"
        onclick="window.app.navigate('hub', '/hub.html')"
      >
        HUEVISION<span class="text-white ml-1 text-sm glow">26</span>
      </div>
      
      <div class="hidden md:flex items-center space-x-1 nav-links">
        <a href="/hub.html" data-tab="hub" class="relative px-6 py-2 text-sm font-display font-medium uppercase tracking-wider transition-all duration-300 text-red-500">
          <span class="relative z-10 flex items-center gap-2">
            <i data-lucide="skull" class="w-4 h-4"></i>
            ГЛАВНАЯ
          </span>
        </a>
        <a href="/lineup.html" data-tab="lineup" class="relative px-6 py-2 text-sm font-display font-medium uppercase tracking-wider transition-all duration-300 text-white/60 hover:text-white">
          <span class="relative z-10 flex items-center gap-2">
            <i data-lucide="users" class="w-4 h-4"></i>
            ЛАЙНАП
          </span>
        </a>
        <a href="/media.html" data-tab="audio" class="relative px-6 py-2 text-sm font-display font-medium uppercase tracking-wider transition-all duration-300 text-white/60 hover:text-white">
          <span class="relative z-10 flex items-center gap-2">
            <i data-lucide="play" class="w-4 h-4"></i>
            МЕДИАЦЕНТР
          </span>
        </a>
        <a href="/apply.html" data-tab="form" class="relative px-6 py-2 text-sm font-display font-medium uppercase tracking-wider transition-all duration-300 text-white/60 hover:text-white">
          <span class="relative z-10 flex items-center gap-2">
            <i data-lucide="file-text" class="w-4 h-4"></i>
            ЗАЯВКА
          </span>
        </a>
      </div>

      <div class="flex md:hidden items-center space-x-2 nav-links">
        <a href="/hub.html" data-tab="hub" class="p-3 text-red-500">
          <i data-lucide="skull" class="w-5 h-5"></i>
        </a>
        <a href="/lineup.html" data-tab="lineup" class="p-3 text-white/60 hover:text-white">
          <i data-lucide="users" class="w-5 h-5"></i>
        </a>
        <a href="/media.html" data-tab="audio" class="p-3 text-white/60 hover:text-white">
          <i data-lucide="play" class="w-5 h-5"></i>
        </a>
        <a href="/apply.html" data-tab="form" class="p-3 text-white/60 hover:text-white">
          <i data-lucide="file-text" class="w-5 h-5"></i>
        </a>
      </div>
    </div>
  </nav>

  <main id="main-content" class="pt-24 pb-20 flex-1"></main>

  <footer class="border-t border-white/10 bg-black py-8 text-center mt-auto">
    <div class="flex flex-col items-center gap-4">
      <div class="text-xl font-display font-black tracking-widest text-white/20">
        HUEVISION
      </div>
      <p class="text-white/30 text-xs font-mono">© 2026 ВСЕ ПРАВА ЗАЩИЩЕНЫ.</p>
    </div>
  </footer>

  <script type="module" src="/app.js"></script>
</body>
</html>
