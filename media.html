<section class="px-4 max-w-4xl mx-auto w-full pt-12 fade-in">
  <div class="mb-12">
    <h2 class="text-4xl md:text-5xl font-display font-black tracking-tighter uppercase text-white">
      <span class="text-red-500">МЕДИАЦЕНТР</span>
    </h2>
    <p class="text-white/40 font-mono text-sm mt-2">ЗАЩИЩЕННЫЙ МЕДИАКАНАЛ</p>
  </div>

  <div class="glass-panel border-red-500/20 box-glow overflow-hidden relative">
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-red-900 via-red-500 to-red-900"></div>
    
    <div class="p-8 flex flex-col md:flex-row gap-8 items-center">
      <!-- Cover -->
      <div class="w-48 h-48 md:w-64 md:h-64 shrink-0 bg-black border border-white/10 relative flex items-center justify-center overflow-hidden group">
        <div id="audio-cover-bg" class="absolute inset-0 bg-cover bg-center transition-transform duration-700 ease-out transform scale-100"></div>
        <div class="absolute inset-0 bg-black/40 mix-blend-overlay group-hover:bg-black/20 transition-colors"></div>
        
        <div id="audio-play-overlay" class="w-16 h-16 rounded-full border border-red-500/50 flex items-center justify-center bg-black/50 backdrop-blur-sm shadow-[0_0_15px_rgba(255,0,0,0.5)] z-10 opacity-70 group-hover:opacity-100 transition-opacity">
          <i data-lucide="play" class="ml-1 text-red-500 w-6 h-6 fill-current"></i>
        </div>
        
        <div id="audio-eq-overlay" class="absolute inset-0 flex items-center justify-center gap-1 bg-black/40 xl:bg-black/20 backdrop-blur-sm group-hover:backdrop-blur-none transition-all duration-300 hidden">
           <div class="w-1.5 bg-red-500 rounded-full shadow-[0_0_10px_rgba(255,0,0,0.8)] eq-bar" style="animation-delay: 0s"></div>
           <div class="w-1.5 bg-red-500 rounded-full shadow-[0_0_10px_rgba(255,0,0,0.8)] eq-bar" style="animation-delay: 0.15s"></div>
           <div class="w-1.5 bg-red-500 rounded-full shadow-[0_0_10px_rgba(255,0,0,0.8)] eq-bar" style="animation-delay: 0.3s"></div>
           <div class="w-1.5 bg-red-500 rounded-full shadow-[0_0_10px_rgba(255,0,0,0.8)] eq-bar" style="animation-delay: 0.45s"></div>
           <div class="w-1.5 bg-red-500 rounded-full shadow-[0_0_10px_rgba(255,0,0,0.8)] eq-bar" style="animation-delay: 0.6s"></div>
        </div>
      </div>

      <div class="flex-1 w-full flex flex-col justify-center">
        <!-- Track Info -->
        <div class="space-y-2 mb-8">
          <div class="flex items-center justify-between">
            <div id="audio-year" class="inline-block px-2 py-1 text-[10px] font-mono tracking-widest text-red-500 border border-red-500/30 bg-red-500/10 mb-2">
              2025 // ENTRY
            </div>
            <button id="toggle-playlist-btn" class="text-white/40 hover:text-white transition-colors">
              <i data-lucide="list-music" class="w-5 h-5"></i>
            </button>
          </div>
          <h3 id="audio-title" class="text-3xl md:text-4xl font-display font-bold text-white tracking-tight text-glow">
            Title
          </h3>
          <p id="audio-artist" class="text-lg text-white/60 font-mono tracking-widest">
            Artist
          </p>
        </div>

        <!-- Progress Bar -->
        <div class="mb-6">
          <div id="progress-container" class="w-full h-2 bg-white/10 rounded-full overflow-hidden relative cursor-pointer group">
            <div id="progress-bar" class="absolute top-0 left-0 h-full bg-red-500 transition-all duration-100 ease-linear shadow-[0_0_10px_rgba(255,0,0,0.8)]" style="width: 0%"></div>
            <div class="absolute top-0 left-0 w-full h-full bg-white/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
          </div>
          <div class="flex justify-between text-[10px] text-white/40 font-mono mt-2">
            <span id="audio-current-time">00:00</span>
            <span id="audio-duration">00:00</span>
          </div>
        </div>

        <!-- Controls -->
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-6">
            <button id="btn-prev" class="text-white/40 hover:text-white transition-colors">
              <i data-lucide="skip-back" class="w-6 h-6"></i>
            </button>
            <button id="btn-play-pause" class="w-16 h-16 rounded-full bg-white text-black flex items-center justify-center hover:bg-red-500 hover:text-white hover:shadow-[0_0_20px_rgba(255,0,0,0.6)] transition-all transform hover:scale-105">
              <i data-lucide="play" class="ml-1 w-7 h-7 fill-current" id="icon-play"></i>
              <i data-lucide="pause" class="w-7 h-7 fill-current hidden" id="icon-pause"></i>
            </button>
            <button id="btn-next" class="text-white/40 hover:text-white transition-colors">
              <i data-lucide="skip-forward" class="w-6 h-6"></i>
            </button>
          </div>

          <div class="flex items-center gap-6">
            <button id="btn-repeat" class="transition-colors text-white/40 hover:text-white" title="Повтор">
              <i data-lucide="repeat" class="w-5 h-5"></i>
            </button>
            <button id="btn-mute" class="transition-colors hidden sm:block text-white/40 hover:text-white" title="Выключить звук">
              <i data-lucide="volume-2" class="w-5 h-5" id="icon-vol-up"></i>
              <i data-lucide="volume-x" class="w-5 h-5 hidden text-red-500" id="icon-vol-mute"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Playlist -->
    <div id="playlist-container" class="overflow-hidden transition-all duration-300 ease-in-out border-t border-white/5 max-h-0 opacity-0 relative">
      <div class="px-4 pt-4 md:px-8 md:pt-8 flex flex-wrap gap-2 border-b border-white/10 pb-4 shrink-0" id="playlist-filters">
        <!-- Generated by JS -->
      </div>
      <div class="p-4 md:p-8 flex flex-col gap-2 h-96 overflow-y-auto hide-scrollbar" id="playlist-items">
        <!-- Generated by JS -->
      </div>
    </div>
  </div>
</section>
