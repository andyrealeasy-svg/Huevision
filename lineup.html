<section class="px-4 max-w-7xl mx-auto w-full pt-12 fade-in">
  <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6 border-b border-white/10 pb-6">
    <div>
      <h2 class="text-4xl md:text-6xl font-display font-black tracking-tighter uppercase text-white">
        <span class="text-red-500">ЛАЙНАП</span>
      </h2>
      <p class="text-white/40 font-mono text-sm mt-2 flex items-center gap-2">
        <span class="w-1.5 h-1.5 bg-yellow-500 rounded-full animate-pulse blur-[1px]"></span>
        СТАТУС: В ОЖИДАНИИ
      </p>
    </div>

    <div class="flex bg-white/5 rounded-none border border-white/5 p-1 w-full md:w-auto shrink-0" id="lineup-tabs">
      <button
        onclick="window.app.setLineupFilter('participant')"
        class="lineup-tab flex-1 md:flex-none px-6 py-2 text-sm font-display uppercase tracking-widest transition-all bg-red-500 text-white font-bold"
        data-filter="participant"
      >
        Участники
      </button>
      <button
        onclick="window.app.setLineupFilter('jury')"
        class="lineup-tab flex-1 md:flex-none px-6 py-2 text-sm font-display uppercase tracking-widest transition-all text-white/50 hover:text-white"
        data-filter="jury"
      >
        Жюри
      </button>
    </div>
  </div>

  <div class="min-h-[400px]" id="lineup-years-container">
    <!-- JS populates this -->
  </div>
</section>
